<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f4f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" />
  <text x="400" y="120" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#fff">1099-K</text>
  <text x="400" y="145" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#ff9f0a">$600</text>
  <text x="400" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">2026 reporting threshold</text>
  <rect x="80" y="200" width="200" height="120" rx="8" fill="rgba(255,159,10,0.1)" stroke="rgba(255,159,10,0.2)" stroke-width="1" />
  <text x="180" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,159,10,0.6)">Self-Employment Tax</text>
  <text x="180" y="260" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff9f0a">15.3%</text>
  <text x="180" y="285" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Social Security + Medicare</text>
  <rect x="300" y="200" width="200" height="120" rx="8" fill="rgba(255,159,10,0.1)" stroke="rgba(255,159,10,0.2)" stroke-width="1" />
  <text x="400" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,159,10,0.6)">QBI Deduction</text>
  <text x="400" y="260" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff9f0a">20%</text>
  <text x="400" y="285" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Off qualified business income</text>
  <rect x="520" y="200" width="200" height="120" rx="8" fill="rgba(255,159,10,0.1)" stroke="rgba(255,159,10,0.2)" stroke-width="1" />
  <text x="620" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,159,10,0.6)">Mileage Rate</text>
  <text x="620" y="260" text-anchor="middle" font-family="monospace" font-size="18" fill="#ff9f0a">67\u00a2</text>
  <text x="620" y="285" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Per mile in 2026</text>
  <text x="400" y="450" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">Side Hustle Taxes 2026</text>
</svg>
