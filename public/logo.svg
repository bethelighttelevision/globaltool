<svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 180 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2997ff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- TS Monogram -->
  <rect x="0" y="4" width="36" height="32" rx="10" fill="url(#g)"/>
  <text x="8" y="27" font-family="Arial,sans-serif" font-weight="800" font-size="20" fill="#fff">TS</text>
  <!-- Lightning bolt accent -->
  <polygon points="28,4 22,18 28,18 24,32 34,16 27,16 31,4" fill="#fff" opacity="0.3"/>
  <!-- ToolSnappy Wordmark -->
  <text x="46" y="27" font-family="Arial,sans-serif" font-weight="800" font-size="20" fill="#fff" letter-spacing="1">TOOL</text>
  <text x="46" y="27" font-family="Arial,sans-serif" font-weight="800" font-size="20" fill="url(#g)" letter-spacing="1">
    <tspan x="82" y="27">SNAPPY</tspan>
  </text>
